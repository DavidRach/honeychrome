name: Multi-Platform Build
run-name: Build for all platforms (Node 24)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-20.04
            artifact_name: linux-x64
          - os: ubuntu-24.04
            artifact_name: linux-x64
          - os: windows-2022
            artifact_name: win-x64
          - os: macos-14
            artifact_name: mac-intel
          - os: macos-latest
            artifact_name: mac-arm64

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel pyinstaller
          pip install -r requirements.txt

      # --- Platform Specific Steps ---

      - name: Build Linux (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          make venv
          make package

      - name: Build macOS (arm64)
        if: matrix.os == 'macos-latest'
        run: | 
          make build
          brew install create-dmg
          chmod +x create_dmg_mac.sh
          ./create_dmg_mac.sh

      - name: Build macOS (intel)
        if: matrix.os == 'macos-14'
        run: | 
          make build
          brew install create-dmg
          chmod +x create_dmg_mac.sh
          ./create_dmg_mac.sh

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          python build.py
          # You can run your Inno Setup script here. 
          # GitHub Windows runners have 'ISCC' (Inno Setup Compiler) pre-installed.
          ISCC honeychrome.iss

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/*
            *.dmg
            *.exe